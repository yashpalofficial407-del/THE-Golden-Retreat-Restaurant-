<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Retreat Restaurant</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    scroll-behavior: smooth;
}

/* HERO SECTION */
.hero {
    background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') center/cover;
    height: 90vh;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 20px;
}

/* NAVBAR */
nav {
    background: black;
    padding: 12px;
    position: sticky;
    top: 0;
    text-align: center;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTIONS */
section {
    padding: 50px 20px;
    text-align: center;
}

/* MENU */
.menu-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.menu-gallery img {
    width: 100%;
    border-radius: 12px;
    transition: transform 0.3s;
}

.menu-gallery img:hover {
    transform: scale(1.05);
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 12px 25px;
    margin: 10px;
    background: #25D366;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
}

.call-btn {
    background: orange;
}

/* FLOATING WHATSAPP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}

/* MAP */
iframe {
    width: 100%;
    height: 300px;
    border: 0;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    padding: 20px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Golden Retreat Restaurant</h1>
        <p>Royal Taste | Cozy Ambience | Online Ordering</p>
        <a class="btn" href="https://wa.me/918962067381">Order Now</a>
        <a class="btn call-btn" href="tel:8962067381">Call Us</a>
    </div>
</div>

<!-- NAV -->
<nav>
    <a href="#menu">Menu</a>
    <a href="#contact">Contact</a>
</nav>

<!-- MENU -->
<section id="menu">
    <h2>🍽️ Our Menu</h2>

    <div class="menu-gallery">
        <img src="menu1.jpg">
        <img src="menu2.jpg">
        <img src="menu3.jpg">
        <img src="menu4.jpg">
        <img src="menu5.jpg">
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>📍 Visit Us</h2>
    <p>Bhanpur Bridge, Near People Medical College</p>
    <p>📞 8962067381</p>

    <iframe src="https://maps.google.com/maps?q=Bhanpur%20Bridge%20People%20Medical%20College&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Golden Retreat Restaurant | All Rights Reserved</p>
</footer>

<!-- FLOAT BUTTON -->
<a class="whatsapp-float" href="https://wa.me/918962067381">💬</a>

</body>
</html>
